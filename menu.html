<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu - Coffee Paradise</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --gold: #d4af37;
        --espresso: #2c1b18;
        --cream: #f9f5f2;
      }
      body {
        font-family: "Inter", sans-serif;
        background: var(--cream);
        color: var(--espresso);
        margin: 0;
      }
      .hero {
        background: var(--espresso);
        padding: 60px 20px;
        text-align: center;
        color: white;
        border-bottom: 5px solid var(--gold);
      }
      .hero h1 {
        font-size: 28px;
        font-weight: 900;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin: 0;
      }
      .container {
        max-width: 600px;
        margin: -30px auto 0;
        padding: 20px;
        position: relative;
      }
      .category-title {
        font-size: 20px;
        font-weight: 900;
        color: var(--espresso);
        margin: 40px 0 20px;
        text-transform: uppercase;
        border-left: 5px solid var(--gold);
        padding-left: 12px;
      }
      .item-card {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 15px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        display: flex;
        transition: 0.2s;
      }
      .item-img {
        width: 110px;
        height: 110px;
        object-fit: cover;
        background: #eee;
        flex-shrink: 0;
      }
      .item-info {
        padding: 12px;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .item-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }
      .item-name {
        font-weight: 800;
        font-size: 17px;
      }
      .item-price {
        color: var(--gold);
        font-weight: 900;
        font-size: 15px;
        white-space: nowrap;
        margin-left: 10px;
      }
      .item-desc {
        font-size: 12px;
        color: #666;
        margin-top: 4px;
        line-height: 1.3;
      }
      #loading {
        text-align: center;
        padding: 100px;
        color: var(--gold);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="hero">
      <h1>Coffee Paradise</h1>
      <p style="color: var(--gold); margin: 5px 0 0">Digital Menu</p>
    </div>

    <div class="container" id="menu-container">
      <div id="loading">CHARGEMENT DU MENU...</div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import {
        getFirestore,
        doc,
        onSnapshot,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      // --- PASTE THE SAME FIREBASE CONFIG BELOW ---
      const firebaseConfig = {
  apiKey: "AIzaSyA21drAoD1ufs6jD-7UXoKNXq1pmhe93yo",
  authDomain: "cofe-shop-1d237.firebaseapp.com",
  projectId: "cofe-shop-1d237",
  storageBucket: "cofe-shop-1d237.firebasestorage.app",
  messagingSenderId: "483930059509",
  appId: "1:483930059509:web:7a91182d92c23a3f5e0bbc"
};

      // -------------------------------------------

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      onSnapshot(doc(db, "settings", "menu"), (snap) => {
        const container = document.getElementById("menu-container");
        if (!snap.exists()) {
          container.innerHTML = "No menu items yet.";
          return;
        }

        const cats = snap.data().categories;
        container.innerHTML = "";

        for (let cat in cats) {
          let html = <div class="category-title">${cat}</div>;
          cats[cat].forEach((item) => {
            // Formats 5.5 to "5,500 DT"
            const priceFormatted =
              parseFloat(item.price || 0)
                .toFixed(3)
                .replace(".", ",") + " DT";
            html += `
                        <div class="item-card">
                            <img src="${
                              item.image || "https://via.placeholder.com/150"
                            }" class="item-img">
                            <div class="item-info">
                                <div class="item-header">
                                    <div class="item-name">${item.name}</div>
                                    <div class="item-price">${priceFormatted}</div>
                                </div>
                                <div class="item-desc">${item.description}</div>
                            </div>
                        </div>`;
          });
          container.innerHTML += html;
        }
      });
    </script>
  </body>
</html>
